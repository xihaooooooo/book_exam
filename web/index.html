<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末速通</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css"
      integrity="sha384-wcIxkf4k558AjM3Yz3BBFQUbk/zgIYC2R0QpeeYb+TwlBVMrlgLqwRjRtGZiK7ww"
      crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"
        integrity="sha384-hIoBPJpTUs74ddyc4bFZSM1TVlQDA60VBbJS0oA934VSz82sBx1X7kSx2ATBDIyd"
        crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="wrap">

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="generate" onclick="switchTab('generate')">📝 出题</button>
    <button class="tab-btn" data-tab="quiz" onclick="switchTab('quiz')">✏️ 答题</button>
    <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">📊 画像</button>
  </div>

  <!-- ═══════ Tab: 出题 ═══════ -->
  <div id="tab-generate" class="tab-content active">

    <div class="card">
      <div class="sec-title">出题模式</div>
      <div class="mode-row">
        <div class="mode-card sel" data-mode="exam" onclick="selectMode('exam')">
          <div class="mode-icon">📖</div>
          <div class="mode-label">全书 / 定向出题</div>
          <div class="mode-hint">支持指定考点 + 参照往年试卷</div>
        </div>
        <div class="mode-card" data-mode="diagnostic" onclick="selectMode('diagnostic')">
          <div class="mode-icon">🔍</div>
          <div class="mode-label">摸底诊断</div>
          <div class="mode-hint">每章 2 道 easy 选择题</div>
        </div>
        <div class="mode-card" data-mode="practice" onclick="selectMode('practice')">
          <div class="mode-icon">🎯</div>
          <div class="mode-label">薄弱练习</div>
          <div class="mode-hint">BKT + Bandit 推荐引擎</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-title">参数设置</div>

      <!-- 题数 + 题型：diagnostic 锁定 -->
      <div class="form-row">
        <label>目标题数</label>
        <input type="number" id="genCount" value="0" min="0" max="50" style="width:70px;">
        <span style="font-size:11px;color:#8B8680;margin-left:4px;" id="countHint">0=自动（6-12 自适应）</span>
        <label style="margin-left:14px;">题型</label>
        <div class="type-tags" id="typeTags">
          <span class="type-tag sel" data-type="choice" onclick="toggleType(this)">选择题</span>
          <span class="type-tag sel" data-type="fill_blank" onclick="toggleType(this)">填空题</span>
          <span class="type-tag sel" data-type="short_answer" onclick="toggleType(this)">简答题</span>
        </div>
      </div>
      <div class="form-row">
        <label>难度</label>
        <div class="type-tags" id="diffTags">
          <span class="type-tag sel" data-diff="easy" onclick="toggleDiff(this)">简单</span>
          <span class="type-tag sel" data-diff="medium" onclick="toggleDiff(this)">中等</span>
          <span class="type-tag sel" data-diff="hard" onclick="toggleDiff(this)">困难</span>
        </div>
      </div>

      <!-- exam 专属：定向考点 -->
      <div class="form-row" id="focusRow">
        <label>定向考点</label>
        <input type="text" id="genFocus" placeholder="关键词，逗号分隔。如：任务调度,信号量,内存管理">
        <span style="font-size:11px;color:#8B8680;">留空=覆盖全书</span>
      </div>

      <!-- exam 专属：往年试卷参照 -->
      <div class="form-row" id="analysisRow" style="flex-wrap:wrap;">
        <label>往年试卷</label>
        <select id="genAnalysis" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);font-size:14px;background:rgba(255,255,255,0.6);outline:none;min-width:200px;">
          <option value="">不参照</option>
        </select>
        <input type="file" id="examFileInput" accept=".docx" style="display:none;" onchange="uploadExamFile(this)">
        <button class="btn btn-next" style="flex:none;width:auto;padding:8px 16px;font-size:13px;" onclick="document.getElementById('examFileInput').click();return false;">📤 上传试卷分析</button>
        <span id="uploadStatus" style="font-size:11px;color:#8B8680;"></span>
      </div>


      <button class="btn-gen" id="genBtn" onclick="doGenerate()">生成试卷</button>
      <div id="genStatus"></div>
    </div>

    <!-- 历史试卷 -->
    <div class="card" style="margin-top:16px;">
      <div class="sec-title">历史试卷</div>
      <div id="examHistory" style="max-height:400px;overflow-y:auto;"></div>
    </div>
  </div>

  <!-- ═══════ Tab: 答题 ═══════ -->
  <div id="tab-quiz" class="tab-content">
    <div id="quizRoot"></div>
  </div>

  <!-- ═══════ Tab: 画像 ═══════ -->
  <div id="tab-profile" class="tab-content">
    <div id="profileRoot"></div>
  </div>
</div>


<script src="js/all.js"></script>
</body>
</html>
