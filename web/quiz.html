<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答题</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 90% 80% at 65% 35%, #4A5D43 0%, #6B7D5E 18%, #A2845B 42%, #C9AD82 65%, #E3C9A3 100%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }
  .card {
    position: relative; z-index: 1; width: min(92vw, 560px);
    background: rgba(255, 255, 255, 0.82); border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 24px 60px -16px rgba(0, 0, 0, 0.12);
    padding: 36px 32px 32px; animation: cardIn 0.45s ease;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } }
  .info {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
  }
  .info .topic { font-size: 16px; font-weight: 300; color: #2E2C29; letter-spacing: 0.03em; }
  .info .meta { display: flex; align-items: center; gap: 12px; }
  .info .timer { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 14px; color: #8B8680; }
  .badge {
    font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace;
    font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
    padding: 6px 14px; border-radius: 20px;
    background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.35);
  }
  .badge.easy { color: #4A7C59; } .badge.medium { color: #A2845B; } .badge.hard { color: #B55A4A; }
  .badge.choice { color: #5A6A82; } .badge.fill_blank { color: #7A6A52; } .badge.short_answer { color: #6A5A72; }
  .prog { display: flex; gap: 4px; align-items: center; margin-bottom: 28px; }
  .prog .seg { flex: 1; height: 5px; border-radius: 3px; background: rgba(0,0,0,0.06); }
  .prog .seg.done { background: #C49A5E; }
  .prog .num { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 13px; color: #8B8680; margin-left: 10px; white-space: nowrap; }
  .stem { font-size: 21px; font-weight: 600; line-height: 2.0; color: #141210; letter-spacing: 0.03em; margin-bottom: 28px; }
  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .opt {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 14px; cursor: pointer; transition: all 0.2s;
    border: 1.5px solid transparent; background: rgba(255,255,255,0.28); user-select: none;
  }
  .opt:hover { background: rgba(255,255,255,0.45); transform: translateY(-2px); }
  .opt .dot {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace;
    font-size: 15px; font-weight: 600;
    background: rgba(255,255,255,0.6); color: #6B6660;
    border: 1.5px solid rgba(0,0,0,0.08);
  }
  .opt .txt { font-size: 17px; font-weight: 500; color: #1a1816; letter-spacing: 0.02em; line-height: 1.7; }
  .opt.sel { background: rgba(255,255,255,0.45); border-color: rgba(196,154,94,0.4); }
  .opt.sel .dot { background: #C49A5E; color: #fff; border-color: #C49A5E; }
  .tinp {
    width: 100%; padding: 14px 18px; border-radius: 14px; border: 1.5px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.6); font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 17px; color: #1a1816; letter-spacing: 0.02em; line-height: 1.7;
    transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 24px; outline: none;
  }
  .tinp:focus { border-color: rgba(196,154,94,0.5); box-shadow: 0 0 0 3px rgba(196,154,94,0.1); }
  .conf { margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .conf .clabel { font-size: 13px; color: #8B8680; font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; }
  .conf .stars { display: flex; gap: 2px; }
  .conf .star { font-size: 24px; cursor: pointer; color: rgba(0,0,0,0.08); transition: all 0.15s; user-select: none; }
  .conf .star:hover { transform: scale(1.2); }
  .conf .star.on { color: #C49A5E; }
  .btns { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 14px; border: none;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: 0.03em; cursor: pointer; transition: all 0.2s;
  }
  .btn-submit { background: #B8894F; color: #fff; box-shadow: 0 4px 20px rgba(184,137,79,0.35); }
  .btn-submit:hover { background: #A67A42; transform: translateY(-1px); }
  .btn-submit:disabled { background: rgba(184,137,79,0.25); color: rgba(184,137,79,0.5); box-shadow: none; cursor: not-allowed; }
  .btn-next { background: rgba(255,255,255,0.5); color: #3a3632; border: 1px solid rgba(255,255,255,0.4); }
  .btn-next:hover { background: rgba(255,255,255,0.7); }
  .btn-finish { background: #B55A4A; color: #fff; box-shadow: 0 4px 20px rgba(181,90,74,0.35); }
  .btn-finish:hover { background: #9B4A3C; transform: translateY(-1px); }
  .btn-finish:disabled { background: rgba(181,90,74,0.25); color: rgba(181,90,74,0.5); box-shadow: none; cursor: not-allowed; }
  .result { text-align: center; animation: cardIn 0.5s ease; }
  .result .big { font-size: 56px; font-weight: 300; color: #2E2C29; letter-spacing: -1px; margin-bottom: 8px; }
  .result .big span { font-size: 18px; color: #8B8680; }
  .result .stats { display: flex; gap: 12px; margin: 28px 0; }
  .result .stat { flex: 1; padding: 20px 12px; border-radius: 14px; background: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.3); }
  .result .stat .val { font-size: 24px; font-weight: 500; color: #2E2C29; }
  .result .stat .lbl { font-size: 12px; color: #8B8680; margin-top: 4px; }
  .result .review { text-align: left; margin-top: 20px; }
  .result .review h3 { font-size: 13px; color: #8B8680; margin-bottom: 10px; font-weight: 400; }
  .result .ritem { padding: 14px 16px; border-radius: 10px; margin-bottom: 6px; display: flex; gap: 12px; align-items: flex-start; font-size: 14px; background: rgba(255,255,255,0.3); }
  .result .ritem.r-ok { border-left: 3px solid #4A7C59; }
  .result .ritem.r-no { border-left: 3px solid #B55A4A; }
  .loading { text-align: center; color: #8B8680; font-size: 16px; padding: 60px 0; }
  .edge-top { position: fixed; top: 14px; left: 18px; z-index: 10; font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 9px; letter-spacing: 0.12em; color: rgba(0,0,0,0.15); pointer-events: none; }
  .edge-bottom { position: fixed; bottom: 14px; right: 18px; z-index: 10; font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 8px; letter-spacing: 0.08em; color: rgba(0,0,0,0.1); pointer-events: none; }
</style>
</head>
<body>

<div class="edge-top">DEPTH EXAM</div>
<div class="edge-bottom" id="studentLabel"></div>
<div id="app"></div>

<script>
// ═══ State ═══
let questions = [], idx = 0, startTs = Date.now(), confidence = 3;
let answers = [];  // { student_answer, duration_sec, confidence }

const API = '';
const studentId = new URLSearchParams(location.search).get('student') || 'anonymous';
document.getElementById('studentLabel').textContent = studentId.toUpperCase();

const TYPE_LABELS = { choice:'选择题', fill_blank:'填空题', short_answer:'简答题', comprehensive:'综合题' };
const DIFF_LABELS = { easy:'简单', medium:'中等', hard:'困难' };

function labelOf(i) { return String.fromCharCode(65 + i); }

// ═══ Event delegation ═══
document.getElementById('app').addEventListener('click', (e) => {
  const opt = e.target.closest('.opt');
  if (opt && !document.querySelector('.opts.submitted')) {
    const oi = parseInt(opt.dataset.oi);
    if (!answers[idx]) answers[idx] = {};
    answers[idx].student_answer = labelOf(oi);
    document.querySelectorAll('.opt').forEach(el => el.classList.remove('sel'));
    opt.classList.add('sel');
    const btn = document.getElementById('submitBtn');
    if (btn) btn.disabled = false;
    return;
  }
  const star = e.target.closest('.star');
  if (star) {
    confidence = parseInt(star.dataset.c);
    document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('on', i < confidence));
    return;
  }
});

document.getElementById('app').addEventListener('input', (e) => {
  if (e.target.id === 'textAns') {
    if (!answers[idx]) answers[idx] = {};
    answers[idx].student_answer = e.target.value;
    const btn = document.getElementById('submitBtn');
    if (btn) btn.disabled = !e.target.value.trim();
  }
});

// ═══ API ═══
async function fetchQuestions() {
  try {
    const res = await fetch(API + '/api/questions');
    if (res.ok) { questions = await res.json(); return; }
  } catch (e) {}
  questions = _demoQuestions();
}

async function submitExam() {
  const payload = {
    student_id: studentId,
    answers: questions.map((q, i) => ({
      question_type: q.question_type,
      student_answer: (answers[i] && answers[i].student_answer) || '',
      correct_answer: q.correct_answer,
      stem: q.stem,
      explanation: q.explanation || '',
      source: q.source || '',
      topic: q.topic || '',
      difficulty: q.difficulty || '',
      duration_sec: (answers[i] && answers[i].duration_sec) || 0,
      confidence: (answers[i] && answers[i].confidence) || 3,
    })),
  };

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);

  try {
    const res = await fetch(API + '/api/submit-exam', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    if (res.ok) {
      const data = await res.json();
      if (data.ok) return data.results;
      console.warn('[submit] 后端返回错误:', data.error);
    }
  } catch (e) {
    clearTimeout(timeoutId);
    console.warn('[submit] 网络错误或超时，降级本地判定:', e.message || e);
  }
  // 降级：本地判定
  return localJudgeAll();
}

// ═══ 本地判定（降级用）═══
function localJudgeAll() {
  return questions.map((q, i) => {
    const ans = answers[i] || {};
    const given = String(ans.student_answer || '').trim();
    const correct = String(q.correct_answer || '').trim();
    let isCorrect = false;
    if (!given) {
      isCorrect = false;
    } else if (q.question_type === 'choice') {
      isCorrect = given.toUpperCase() === correct.toUpperCase();
    } else {
      isCorrect = given === correct;
    }
    return { is_correct: isCorrect, reason: '本地判定（降级）', method: 'fallback', correct_answer: q.correct_answer, explanation: q.explanation || '' };
  });
}

// ═══ Render ═══
function render() {
  if (!questions.length) {
    document.getElementById('app').innerHTML = '<div class="card loading">加载题目中...</div>';
    return;
  }
  const q = questions[idx], total = questions.length;
  const ans = answers[idx] || {};
  const isChoice = q.question_type === 'choice';
  const elapsed = Math.floor((Date.now() - startTs) / 1000);
  const hasAnswer = ans.student_answer && ans.student_answer.trim();

  let segs = '';
  for (let i = 0; i < total; i++) segs += `<div class="seg${i<=idx?' done':''}"></div>`;

  let inputHtml = '';
  if (isChoice) {
    let o = '<div class="opts">';
    (q.options||[]).forEach((opt,i) => {
      let cls = labelOf(i) === ans.student_answer ? ' sel' : '';
      o += `<div class="opt${cls}" data-oi="${i}"><div class="dot">${labelOf(i)}</div><div class="txt">${opt.replace(/^[A-D][.、\s]+/,'')}</div></div>`;
    });
    inputHtml = o + '</div>';
  } else {
    const ph = q.question_type==='fill_blank'?'请输入答案...':'请输入你的回答...';
    inputHtml = `<textarea class="tinp" id="textAns" rows="${q.question_type==='short_answer'?4:2}" placeholder="${ph}">${ans.student_answer||''}</textarea>`;
  }

  let starsHtml = '';
  for (let i=0;i<5;i++) starsHtml += `<span class="star${i<confidence?' on':''}" data-c="${i+1}">★</span>`;

  // 最后一道题显示"交卷"，否则显示"下一题"
  const isLast = idx === total - 1;
  const btnHtml = isLast
    ? `<button class="btn btn-finish" id="submitBtn" onclick="confirmSubmit()" ${!hasAnswer?'disabled':''}>交卷</button>`
    : `<button class="btn btn-submit" id="submitBtn" onclick="nextQ()" ${!hasAnswer?'disabled':''}>下一题 →</button>`;

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="info">
        <div class="topic">${q.source||''}  ${q.topic||''}</div>
        <div class="meta">
          <div class="timer">${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}</div>
          <div class="badge ${q.question_type}">${TYPE_LABELS[q.question_type]||q.question_type}</div>
          <div class="badge ${q.difficulty}">${DIFF_LABELS[q.difficulty]||q.difficulty}</div>
        </div>
      </div>
      <div class="prog">${segs}<div class="num">${String(idx+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div></div>
      <div class="stem">${q.stem}</div>
      ${inputHtml}
      <div class="conf"><span class="clabel">把握度</span><div class="stars">${starsHtml}</div></div>
      <div class="btns">${btnHtml}</div>
    </div>`;
}

// ═══ Actions ═══
function nextQ() {
  const ans = answers[idx] || {};
  if (!ans.student_answer) return;

  // 暂存时间+信心（不判，不提交）
  ans.duration_sec = Math.floor((Date.now() - startTs) / 1000);
  ans.confidence = confidence;
  answers[idx] = ans;

  if (idx < questions.length - 1) {
    idx++;
    startTs = Date.now();
    confidence = 3;
    render();
  }
}

async function confirmSubmit() {
  const ans = answers[idx] || {};
  if (!ans.student_answer) return;
  ans.duration_sec = Math.floor((Date.now() - startTs) / 1000);
  ans.confidence = confidence;
  answers[idx] = ans;

  const unanswered = [];
  questions.forEach((_, i) => {
    if (!answers[i] || !answers[i].student_answer || !answers[i].student_answer.trim()) {
      unanswered.push(i + 1);
    }
  });

  if (unanswered.length > 0) {
    if (!confirm(`第 ${unanswered.join(', ')} 题未作答，确定交卷？`)) return;
  } else {
    if (!confirm('确定交卷？')) return;
  }

  // 显示 loading
  document.getElementById('app').innerHTML = '<div class="card loading">判题中，请稍候...</div>';

  const results = await submitExam();

  // 合并后端结果到 answers
  results.forEach((r, i) => {
    if (!answers[i]) answers[i] = {};
    answers[i].is_correct = r.is_correct;
    answers[i].reason = r.reason;
    answers[i].method = r.method;
  });

  showResult(results);
}

function showResult(results) {
  const correct = results.filter(r => r && r.is_correct).length;
  const total = questions.length;
  const accuracy = total > 0 ? Math.round(correct / total * 100) : 0;
  const highConfWrong = results.filter((r, i) => r && !r.is_correct && (answers[i] && answers[i].confidence >= 4)).length;

  let reviewHtml = '';
  questions.forEach((q, i) => {
    const a = answers[i] || {};
    const r = results[i] || {};
    const isCorrect = r.is_correct;
    reviewHtml += `
      <div class="ritem ${isCorrect ? 'r-ok' : 'r-no'}">
        <div>${isCorrect ? '✓' : '✗'}</div>
        <div>
          <div style="font-weight:500;margin-bottom:2px;">${i+1}. ${q.stem}</div>
          <div style="font-size:12px;color:#8B8680;">
            你的答案：${a.student_answer || '未答'}  |  正确：${q.correct_answer}
            |  用时：${a.duration_sec||0}s  |  信心：${'★'.repeat(a.confidence||0)}
            ${r.method === 'llm' ? ' | 🤖 LLM 判定' : r.method === 'fallback' ? ' | ⚠️ 降级判定' : ''}
            ${r.reason ? '<br>判定理由：' + r.reason : ''}
          </div>
        </div>
      </div>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="card result">
      <div class="big">${accuracy}<span>%</span></div>
      <div style="color:#8B8680;font-size:14px;">正确率 ${accuracy}%  —  ${accuracy >= 80 ? '非常棒！' : accuracy >= 60 ? '不错，继续加油' : '别灰心，多练几次'}</div>
      <div class="stats">
        <div class="stat"><div class="val">${correct}/${total}</div><div class="lbl">正确</div></div>
        <div class="stat"><div class="val">${accuracy}%</div><div class="lbl">正确率</div></div>
        <div class="stat"><div class="val">${highConfWrong}</div><div class="lbl">高信心错误</div></div>
      </div>
      <div class="review"><h3>答题回顾</h3>${reviewHtml}</div>
      <button class="btn btn-submit" style="margin-top:16px;width:100%;" onclick="location.reload()">重新开始</button>
    </div>`;
}

// ═══ Demo fallback ═══
function _demoQuestions() {
  return [
    { id:'d0', question_type:'choice', difficulty:'easy', source:'1.1', topic:'操作系统定义', stem:'以下哪项不是操作系统的核心功能？', options:['A. 进程管理','B. 内存管理','C. 编译程序','D. 文件管理'], correct_answer:'C', explanation:'编译程序属于编程工具，不是OS内核的核心功能。' },
    { id:'d1', question_type:'choice', difficulty:'medium', source:'2.1', topic:'进程状态转换', stem:'当一个进程从运行态变为就绪态时，可能的原因是？', options:['A. 进程完成了I/O操作','B. 时间片用完','C. 进程请求I/O','D. 进程被创建'], correct_answer:'B', explanation:'时间片用完后，进程回到就绪态等待下一次调度。' },
    { id:'d2', question_type:'choice', difficulty:'hard', source:'2.3', topic:'任务调度', stem:'在μC/OS-II中，以下哪个函数会引起任务调度？', options:['A. OSTimeDly()','B. OSSemPend()','C. OSFlagPend()','D. 以上都可以'], correct_answer:'D', explanation:'三个函数都可能使当前任务挂起，触发任务调度。' },
    { id:'d3', question_type:'choice', difficulty:'medium', source:'3.1', topic:'临界区互斥', stem:'下列关于临界区的描述，错误的是？', options:['A. 临界区是访问共享资源的代码段','B. 多个进程可以同时进入同一个临界区','C. 临界区需要互斥机制保护','D. 关中断是实现临界区的一种方式'], correct_answer:'B', explanation:'临界区必须互斥访问，同一时刻只允许一个进程进入。' },
    { id:'d4', question_type:'choice', difficulty:'easy', source:'4.1', topic:'内存管理', stem:'虚拟内存技术的主要目的是？', options:['A. 提高CPU速度','B. 扩展物理内存容量','C. 使程序运行在比物理内存大的地址空间','D. 减少缺页中断'], correct_answer:'C', explanation:'虚拟内存让程序可以使用超过物理内存大小的地址空间。' },
    { id:'d5', question_type:'fill_blank', difficulty:'easy', source:'1.2', topic:'操作系统特征', stem:'操作系统最基本的特征包括并发、共享、虚拟和____。', options:[], correct_answer:'异步', explanation:'操作系统的四大基本特征：并发、共享、虚拟、异步。' },
    { id:'d6', question_type:'short_answer', difficulty:'medium', source:'2.2', topic:'进程同步', stem:'请简述信号量机制的基本原理。', options:[], correct_answer:'信号量是一个整型变量，通过P操作和V操作实现进程同步。', explanation:'P操作(wait)申请资源，V操作(signal)释放资源。' },
  ];
}

// ═══ Start ═══
(async function() {
  await fetchQuestions();
  answers = new Array(questions.length);
  render();
})();
</script>
</body>
</html>
