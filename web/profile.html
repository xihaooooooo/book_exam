<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生画像 — BKT + Bandit</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    min-height: 100vh;
    background: radial-gradient(ellipse 90% 80% at 65% 35%, #4A5D43 0%, #6B7D5E 18%, #A2845B 42%, #C9AD82 65%, #E3C9A3 100%);
    background-attachment: fixed;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 32px 16px 60px; }

  /* ── Header ── */
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.85); letter-spacing: 0.04em; }
  .header a { font-size: 13px; color: rgba(255,255,255,0.6); text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.3); transition: color 0.2s; }
  .header a:hover { color: rgba(255,255,255,0.9); }

  /* ── Search bar ── */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 28px;
    padding: 6px; border-radius: 16px;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
  }
  .search-bar input {
    flex: 1; padding: 12px 16px; border-radius: 12px; border: none;
    background: rgba(255,255,255,0.75); font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace;
    font-size: 16px; color: #1a1816; outline: none; letter-spacing: 0.03em;
  }
  .search-bar input::placeholder { color: #B5B0A8; }
  .search-bar button {
    padding: 12px 28px; border-radius: 12px; border: none;
    background: #B8894F; color: #fff; font-family: inherit;
    font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(184,137,79,0.3);
  }
  .search-bar button:hover { background: #A67A42; transform: translateY(-1px); }
  .search-bar button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Cards ── */
  .card {
    background: rgba(255,255,255,0.82); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 12px 36px -12px rgba(0,0,0,0.08);
    padding: 24px 28px; margin-bottom: 16px;
    animation: cardIn 0.4s ease;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } }

  /* ── Overview ── */
  .overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .stat-card {
    background: rgba(255,255,255,0.82); border-radius: 18px; padding: 22px 20px;
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 12px 36px -12px rgba(0,0,0,0.08);
    text-align: center; animation: cardIn 0.4s ease;
  }
  .stat-card .val { font-size: 32px; font-weight: 300; color: #2E2C29; letter-spacing: -0.5px; }
  .stat-card .lbl { font-size: 12px; color: #8B8680; margin-top: 4px; letter-spacing: 0.04em; }

  /* mastery pills */
  .mastery-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
  .pill {
    font-size: 12px; font-weight: 500; letter-spacing: 0.03em;
    padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.06);
    color: #5A5650;
  }
  .pill.mastered { background: rgba(74,124,89,0.15); border-color: rgba(74,124,89,0.3); color: #3A6348; }
  .pill.weak { background: rgba(181,90,74,0.12); border-color: rgba(181,90,74,0.25); color: #9B4A3C; }
  .pill.unstable { background: rgba(212,149,106,0.12); border-color: rgba(212,149,106,0.25); color: #A06838; }

  /* ── Section title ── */
  .sec-title { font-size: 13px; font-weight: 500; color: #8B8680; letter-spacing: 0.06em; margin-bottom: 12px; text-transform: uppercase; }

  /* ── Topic list ── */
  .topic-row {
    display: grid; grid-template-columns: 1fr 180px 80px;
    align-items: center; gap: 16px; padding: 14px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-name { font-size: 15px; font-weight: 500; color: #2E2C29; }
  .topic-name .sid { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 12px; color: #8B8680; margin-right: 6px; }
  .topic-name .err { display: inline-block; font-size: 11px; color: #B55A4A; margin-left: 8px; padding: 1px 8px; border-radius: 10px; background: rgba(181,90,74,0.08); }

  /* P(L) bar */
  .pl-bar-wrap { position: relative; }
  .pl-bar-bg { height: 8px; border-radius: 4px; background: rgba(0,0,0,0.05); overflow: hidden; }
  .pl-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease, background 0.6s ease; }
  .pl-bar-label { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 11px; color: #8B8680; margin-top: 4px; text-align: right; }

  /* Beta mini */
  .beta-mini { display: flex; align-items: center; gap: 6px; }
  .beta-mini canvas { border-radius: 4px; background: rgba(0,0,0,0.02); }
  .beta-params { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 10px; color: #A09890; line-height: 1.5; }

  /* mastery level badge */
  .ml-badge {
    display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
    padding: 2px 10px; border-radius: 20px;
  }
  .ml-badge.mastered { background: rgba(74,124,89,0.12); color: #3A6348; }
  .ml-badge.familiar { background: rgba(138,170,106,0.12); color: #5A7A42; }
  .ml-badge.unstable { background: rgba(212,149,106,0.12); color: #A06838; }
  .ml-badge.weak { background: rgba(181,90,74,0.12); color: #9B4A3C; }
  .ml-badge.unknown { background: rgba(0,0,0,0.04); color: #A09890; }

  /* ── Recommendation table ── */
  .rec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rec-table th {
    text-align: left; padding: 8px 10px; font-weight: 500; letter-spacing: 0.03em;
    color: #8B8680; border-bottom: 2px solid rgba(0,0,0,0.06); font-size: 11px;
  }
  .rec-table td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.04); color: #3A3632; }
  .rec-table .rec-prio { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 12px; color: #B8894F; font-weight: 600; }
  .rec-reason { font-size: 13px; color: #8B8680; margin-top: 12px; padding: 10px 14px; background: rgba(0,0,0,0.02); border-radius: 10px; line-height: 1.6; }

  /* ── Error distribution ── */
  .err-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .err-bar .err-label { width: 80px; font-size: 13px; color: #5A5650; text-align: right; flex-shrink: 0; }
  .err-bar .err-track { flex: 1; height: 6px; border-radius: 3px; background: rgba(0,0,0,0.04); overflow: hidden; }
  .err-bar .err-fill { height: 100%; border-radius: 3px; background: #B8894F; transition: width 0.5s ease; }
  .err-bar .err-cnt { font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 12px; color: #8B8680; width: 50px; flex-shrink: 0; }

  /* ── Risk signals ── */
  .risk-item {
    padding: 10px 14px; margin-bottom: 6px; border-radius: 10px;
    background: rgba(181,90,74,0.06); border-left: 3px solid #B55A4A;
    font-size: 13px; color: #5A3A30; line-height: 1.5;
  }

  /* ── States ── */
  .empty-state { text-align: center; padding: 48px 20px; color: #B5B0A8; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .loading-state { text-align: center; padding: 48px 20px; color: #8B8680; font-size: 15px; }
  .error-state { text-align: center; padding: 48px 20px; color: #B55A4A; font-size: 15px; }

  .edge-top { position: fixed; top: 14px; left: 18px; z-index: 10; font-family: "SF Mono", "IBM Plex Mono", Menlo, monospace; font-size: 9px; letter-spacing: 0.12em; color: rgba(0,0,0,0.15); pointer-events: none; }

  @media (max-width: 640px) {
    .topic-row { grid-template-columns: 1fr; gap: 8px; }
    .overview { grid-template-columns: repeat(2, 1fr); }
    .rec-table { font-size: 11px; }
    .rec-table th, .rec-table td { padding: 6px; }
  }
</style>
</head>
<body>

<div class="edge-top">PROFILE — BKT + BANDIT</div>

<div class="wrap">
  <div class="header">
    <h1>🎓 学习画像</h1>
    <div style="display:flex;gap:14px;">
      <a href="index.html">速通</a>
      <a href="quiz.html">答题</a>
    </div>
  </div>

  <!-- Content area -->
  <div id="content"><div class="loading-state">输入学生 ID 查看画像</div></div>
</div>

<script>
// ═══ Constants ═══
const ML_LABELS = { mastered:'已掌握', familiar:'熟悉', unstable:'不稳定', weak:'薄弱', unknown:'未知' };
const DIFF_LABELS = { easy:'简单', easy_to_medium:'简单→中等', medium:'中等', medium_to_hard:'中等→困难', hard:'困难' };

// ═══ Init: auto-load ═══
const STUDENT_ID = new URLSearchParams(location.search).get('student') || 'default';
loadProfile(STUDENT_ID);

async function loadProfile(sid) {
  if (!sid) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading-state">加载中...</div>';

  try {
    const res = await fetch('/api/profile?student_id=' + encodeURIComponent(sid));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '未知错误');
    if (data.total_attempts === 0) {
      content.innerHTML = `<div class="empty-state"><div class="icon">📭</div>暂无作答记录<br><span style="font-size:13px;color:#B5B0A8;">去 <a href="quiz.html" style="color:#B8894F;">答题</a> 积累数据</span></div>`;
    } else {
      render(data);
    }
  } catch (e) {
    content.innerHTML = `<div class="error-state">❌ 加载失败：${e.message}</div>`;
  }
}

// ═══ Render ═══
function render(d) {
  const mastery = d.mastery_summary || {};
  const topics = d.topics || [];
  const rec = d.recommendation || {};
  const errDist = d.error_distribution || {};
  const risks = d.risk_signals || [];

  let pills = '';
  for (const [k, v] of Object.entries(mastery)) {
    if (v > 0) pills += `<span class="pill ${k}">${ML_LABELS[k]||k} ${v}</span>`;
  }

  // ── Overview ──
  let html = `
  <div class="overview">
    <div class="stat-card"><div class="val">${fmtPct(d.overall_accuracy)}</div><div class="lbl">整体正确率</div></div>
    <div class="stat-card"><div class="val">${d.total_attempts}</div><div class="lbl">总作答次数</div></div>
    <div class="stat-card"><div class="val">${topics.length}</div><div class="lbl">覆盖知识点</div></div>
    <div class="stat-card">
      <div class="val" style="font-size:22px;">${mastery.mastered||0}<span style="font-size:14px;color:#8B8680;">/${topics.length}</span></div>
      <div class="lbl">已掌握</div>
      <div class="mastery-pills">${pills}</div>
    </div>
  </div>`;

  // ── Topics with P(L) bars + Beta ──
  html += `<div class="card"><div class="sec-title">知识点掌握概率 · P(L) + Thompson Sampling</div>`;
  if (topics.length === 0) {
    html += '<div class="empty-state" style="padding:24px;">暂无知识点数据</div>';
  } else {
    for (const t of topics) {
      const bkt = t.bkt;
      const bandit = t.bandit;
      const pL = bkt ? bkt.p_mastery : 0;
      const pLPct = fmtPct(pL);
      const barColor = pLColor(pL);
      const errLabel = t.dominant_error_type || '';

      html += `<div class="topic-row">
        <div class="topic-name">
          <span class="sid">${esc(t.section_id)}</span>${esc(t.topic) || esc(t.section_id)}
          ${errLabel ? `<span class="err">${esc(errLabel)}</span>` : ''}
          <span class="ml-badge ${t.mastery_level}">${ML_LABELS[t.mastery_level]||t.mastery_level}</span>
        </div>
        <div class="pl-bar-wrap">
          <div class="pl-bar-bg"><div class="pl-bar-fill" style="width:${Math.round(pL*100)}%;background:${barColor};"></div></div>
          <div class="pl-bar-label">P(L) = ${pLPct}  (${bkt?bkt.correct_count:0}/${bkt?bkt.total_attempts:0})</div>
        </div>`;

      if (bandit) {
        const betaId = 'beta_' + t.section_id.replace(/[.\s]/g, '_');
        html += `<div class="beta-mini"><canvas id="${betaId}" width="80" height="32"></canvas>
          <div class="beta-params">α=${bandit.alpha.toFixed(1)}<br>β=${bandit.beta.toFixed(1)}</div></div>`;
      } else {
        html += '<div></div>';
      }
      html += '</div>';
    }
  }
  html += '</div>';

  // ── Recommendation ──
  html += `<div class="card"><div class="sec-title">推荐练习计划</div>`;
  if (rec.items && rec.items.length > 0) {
    html += `
    <table class="rec-table">
      <thead><tr><th>#</th><th>章节</th><th>P(L)</th><th>难度</th><th>题型</th><th>题数</th></tr></thead>
      <tbody>`;
    rec.items.forEach((item, i) => {
      html += `<tr>
        <td class="rec-prio">${i + 1}</td>
        <td>${esc(item.section_id)} ${esc(item.topic||'')}</td>
        <td>${fmtPct(item.p_mastery)}</td>
        <td>${DIFF_LABELS[item.difficulty]||item.difficulty}</td>
        <td>${(item.question_types||[]).join(', ')}</td>
        <td>${item.recommended_count}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    html += `<div class="rec-reason">📋 ${esc(rec.reason)}（共 ${rec.target_count} 题）</div>`;
  } else {
    html += '<div class="empty-state" style="padding:24px;">暂无推荐数据</div>';
  }
  html += '</div>';

  // ── Error distribution + Risk signals ──
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';

  // Errors
  html += '<div class="card"><div class="sec-title">错因分布</div>';
  const errEntries = Object.entries(errDist);
  if (errEntries.length > 0) {
    const maxCnt = Math.max(...errEntries.map(e => e[1]));
    for (const [label, cnt] of errEntries) {
      const w = maxCnt > 0 ? Math.round(cnt / maxCnt * 100) : 0;
      html += `<div class="err-bar"><span class="err-label">${esc(label)}</span><div class="err-track"><div class="err-fill" style="width:${w}%;"></div></div><span class="err-cnt">${cnt} 次</span></div>`;
    }
  } else {
    html += '<div class="empty-state" style="padding:24px;">暂无错因标签</div>';
  }
  html += '</div>';

  // Risks
  html += '<div class="card"><div class="sec-title">风险信号</div>';
  if (risks.length > 0) {
    for (const r of risks) {
      html += `<div class="risk-item">⚠️ ${esc(r)}</div>`;
    }
  } else {
    html += '<div class="empty-state" style="padding:24px;">✅ 无异常信号</div>';
  }
  html += '</div></div>';

  document.getElementById('content').innerHTML = html;

  // ── Draw Beta canvases ──
  for (const t of topics) {
    if (t.bandit) {
      const betaId = 'beta_' + t.section_id.replace(/[.\s]/g, '_');
      drawBeta(betaId, t.bandit.alpha, t.bandit.beta);
    }
  }
}

// ═══ Beta PDF canvas ═══
function drawBeta(canvasId, alpha, beta) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Compute log-beta using approximation
  // We'll sample the PDF at N points
  const N = 80;
  const pts = [];
  let maxY = 0;
  for (let i = 0; i <= N; i++) {
    const x = 0.01 + i / N * 0.98; // clamp away from 0 and 1
    const y = betaPDF(x, alpha, beta);
    pts.push({ x, y });
    if (y > maxY) maxY = y;
  }

  // Scale
  const pad = 2;
  const plotW = W - pad * 2;
  const plotH = H - pad * 2;

  if (maxY === 0 || !isFinite(maxY)) {
    // Flat line
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.moveTo(pad, H / 2);
    ctx.lineTo(W - pad, H / 2);
    ctx.stroke();
    return;
  }

  // Draw area
  ctx.fillStyle = 'rgba(184,137,79,0.15)';
  ctx.beginPath();
  ctx.moveTo(pad, H - pad);
  for (const pt of pts) {
    const sx = pad + pt.x * plotW;
    const sy = H - pad - (pt.y / maxY) * plotH;
    ctx.lineTo(sx, sy);
  }
  ctx.lineTo(W - pad, H - pad);
  ctx.closePath();
  ctx.fill();

  // Draw line
  ctx.strokeStyle = '#B8894F';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  let first = true;
  for (const pt of pts) {
    const sx = pad + pt.x * plotW;
    const sy = H - pad - (pt.y / maxY) * plotH;
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // Draw mean line
  const mean = alpha / (alpha + beta);
  const mx = pad + mean * plotW;
  ctx.strokeStyle = 'rgba(181,90,74,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.moveTo(mx, pad);
  ctx.lineTo(mx, H - pad);
  ctx.stroke();
  ctx.setLineDash([]);
}

function betaPDF(x, alpha, beta) {
  // log pdf = (α-1)*log(x) + (β-1)*log(1-x) - logBeta(α,β)
  const logBeta = lbeta(alpha, beta);
  const logPdf = (alpha - 1) * Math.log(x) + (beta - 1) * Math.log(1 - x) - logBeta;
  return Math.exp(logPdf);
}

function lbeta(a, b) {
  // log Beta(a,b) = logGamma(a) + logGamma(b) - logGamma(a+b)
  return lgamma(a) + lgamma(b) - lgamma(a + b);
}

function lgamma(x) {
  // Stirling approximation for log Gamma
  if (x < 0.5) {
    // reflection formula
    return Math.log(Math.PI / Math.sin(Math.PI * x)) - lgamma(1 - x);
  }
  x -= 1;
  const s = 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(x + 5.5) - (x + 5.5)
    + Math.log(1 + 1/12/(x+5.5) + 1/288/(x+5.5)/(x+5.5));
  return s;
}

// ═══ Helpers ═══
function fmtPct(v) { return Math.round((v||0) * 100) + '%'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function pLColor(pL) {
  if (pL < 0.3) return '#B55A4A';
  if (pL < 0.5) return '#D4956A';
  if (pL < 0.7) return '#C49A5E';
  if (pL < 0.85) return '#8AAA6A';
  return '#4A7C59';
}
</script>
</body>
</html>
